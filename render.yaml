services:
  - type: web
    name: marketingpro
    runtime: go
    rootDir: artifacts/api-server-go
    buildCommand: go build -mod=vendor -o server .
    startCommand: ./server
    envVars:
      - key: ADMIN_SECRET
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: marketingpro-db
          property: connectionString

databases:
  - name: marketingpro-db
    databaseName: marketingpro
    user: mpuser
    plan: free